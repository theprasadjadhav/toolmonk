# ClusterIP service — used by the Next.js API route to reach the runner.
# RUNNER_URL=http://toolmonk-code-runner.toolmonk-code-runner.svc.cluster.local:2000
---
apiVersion: v1
kind: Service
metadata:
  name: toolmonk-code-runner
  namespace: toolmonk-code-runner
spec:
  selector:
    app: toolmonk-code-runner
  ports:
    - name: http
      port: 2000
      targetPort: 2000
      protocol: TCP
  type: ClusterIP
---
# Headless service required by the StatefulSet (spec.serviceName).
# Pod DNS: toolmonk-code-runner-0.toolmonk-code-runner-headless.toolmonk-code-runner.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: toolmonk-code-runner-headless
  namespace: toolmonk-code-runner
spec:
  clusterIP: None
  selector:
    app: toolmonk-code-runner
  ports:
    - name: http
      port: 2000
      targetPort: 2000
      protocol: TCP
